<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy — NaMe Magazine</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-static" data-page-title="privacyPageTitle">
  <header class="header" id="header">
    <div class="header__top">
      <a href="./" class="logo"><span class="brand-mark">NaMe</span></a>
      <nav class="header__actions">
        <a href="subscribe.html" data-i18n="subscribe">Subscribe</a>
        <a href="#auth" id="auth-link" data-i18n="loginJoin">Login / Join</a>
      </nav>
      <button class="header__menu-btn" type="button" id="menu-btn"><span></span><span></span></button>
    </div>
    <nav class="header__nav" id="main-nav">
      <div class="nav-dropdown" data-nav-dropdown="about">
        <a href="about.html" class="nav-dropdown__main" data-i18n="about">About</a>
        <button type="button" class="nav-dropdown__toggle" aria-expanded="false" data-i18n-aria="navAboutMenu" aria-label="About menu">
          <span class="nav-dropdown__caret" aria-hidden="true"></span>
        </button>
        <div class="nav-dropdown__menu">
          <a href="business.html" data-i18n="business">Business</a>
          <a href="contact.html" data-i18n="contact">Contact</a>
        </div>
      </div>
      <div class="nav-dropdown" data-nav-dropdown="stories">
        <span class="nav-dropdown__main" data-i18n="navStories">Stories</span>
        <button type="button" class="nav-dropdown__toggle" aria-expanded="false" data-i18n-aria="navStoriesMenu" aria-label="Stories menu">
          <span class="nav-dropdown__caret" aria-hidden="true"></span>
        </button>
        <div class="nav-dropdown__menu">
          <a href="magazine.html" data-i18n="magazine">Magazine</a>
          <a href="editorial.html" data-i18n="editorial">Editorial</a>
          <a href="articles.html" data-i18n="article">Article</a>
          <a href="film.html" data-i18n="film">Film</a>
        </div>
      </div>
    </nav>
      <div class="lang-select header__lang">
        <select id="lang-select" data-i18n-aria="language" aria-label="Language">
          <option value="en">English</option>
          <option value="ko">한국어</option>
          <option value="zh-Hans">简体中文</option>
          <option value="zh-Hant">繁體中文</option>
        </select>
      </div>
    </div>
  </header>
  <main class="static-page static-page--legal">
    <a href="./" class="static-page__back" data-i18n="backHome">← Back to NaMe</a>
    <h1 class="static-page__title" data-i18n="privacyTitle">Privacy Policy</h1>
    <div class="static-page__content" data-i18n-html="privacyBody"></div>
  </main>
  <footer class="footer">
    <p class="footer__copy" data-i18n="footerCopy"></p>
  </footer>
  <div class="modal" id="auth-modal" aria-hidden="true">
    <div class="modal__backdrop" data-close-auth></div>
    <div class="modal__panel modal__panel--wide" role="dialog">
      <button class="modal__close" type="button" data-close-auth>&times;</button>
      <form id="auth-login-form" class="auth-form" data-auth-panel="login">
        <input type="email" name="loginEmail" data-login-email required />
        <input type="password" name="loginPassword" data-login-password required />
        <button type="submit" class="btn btn--primary">Login</button>
      </form>
    </div>
  </div>
  <script src="base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="i18n.js"></script>
  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script src="page.js"></script>
</body>
</html>
