<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaMe — Upload post</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-admin">
  <div id="admin-gate" class="admin-gate">
    <div class="admin-gate__panel">
      <a href="./" class="logo"><span class="brand-mark">NaMe</span></a>
      <h1 data-i18n="adminGateTitle">Admin access</h1>
      <p data-i18n="adminDenied">You need an admin account to upload posts.</p>
      <button type="button" class="btn btn--primary" data-open-auth="login" data-i18n="authLoginBtn">Login</button>
      <a href="./" class="admin-gate__back" data-i18n="backHome">← Back to NaMe</a>
    </div>
  </div>

  <div id="admin-app" class="admin-app is-hidden">
    <aside class="admin-sidebar">
      <a href="./" class="logo admin-sidebar__logo">NaMe</a>
      <p class="admin-sidebar__label" data-i18n="adminPanel">Admin</p>
      <nav class="admin-nav" id="admin-sidebar-nav"></nav>
      <div class="admin-sidebar__foot">
        <a href="./" target="_blank" rel="noopener" data-i18n="adminViewSite">View site →</a>
        <button type="button" id="admin-logout" data-i18n="adminLogout">Log out</button>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <h1 class="admin-topbar__title" data-i18n="adminUploadPageTitle">Upload post</h1>
        <span class="admin-topbar__user" id="admin-user-label"></span>
      </header>

      <section class="admin-panel is-active admin-upload-page">
        <p class="admin-upload-intro" data-i18n="adminUploadIntro">
          Publish articles, editorials, films, and shorts to the NaMe homepage. Only admins can upload.
        </p>

        <div class="admin-upload-layout">
          <form class="admin-form admin-upload-form" id="upload-form">
            <div class="admin-form__grid">
              <label>
                <span data-i18n="adminType">Type</span>
                <select name="type" id="upload-type" required>
                  <option value="article">Article</option>
                  <option value="editorial">Editorial</option>
                  <option value="film">Film</option>
                  <option value="short">Short</option>
                </select>
              </label>
              <label>
                <span data-i18n="adminSection">Section</span>
                <select name="section" id="upload-section">
                  <option value="">—</option>
                  <option value="latest">Latest</option>
                  <option value="popular">Popular</option>
                </select>
              </label>
            </div>

            <label>
              <span data-i18n="adminTitleField">Title</span>
              <input type="text" name="title" id="upload-title" required />
            </label>

            <label>
              <span data-i18n="adminMeta">Meta (category — date)</span>
              <input type="text" name="meta" id="upload-meta" placeholder="Fashion — 02 Mar 2026" />
            </label>

            <div class="admin-upload-media">
              <label class="admin-upload-drop">
                <span data-i18n="adminImage">Cover image</span>
                <input type="file" name="image" id="upload-image" accept="image/*" />
                <span class="admin-upload-drop__hint" data-i18n="adminImageHint">Click to choose or drag an image</span>
              </label>
              <label>
                <span data-i18n="adminImageUrl">Or image URL</span>
                <input type="url" name="imageUrl" id="upload-image-url" placeholder="https://…" />
              </label>
            </div>

            <label>
              <span data-i18n="adminBody">Body (HTML allowed)</span>
              <textarea name="body" id="upload-body" rows="10" placeholder="<p>Your story…</p>"></textarea>
            </label>

            <label id="upload-video-wrap">
              <span data-i18n="adminVideo">Video URL (films)</span>
              <input type="url" name="videoUrl" id="upload-video" placeholder="https://…" />
            </label>

            <label class="admin__check">
              <input type="checkbox" name="featured" id="upload-featured" value="1" />
              <span data-i18n="adminFeatured">Featured on cover hero</span>
            </label>

            <div class="admin-form__actions">
              <button type="submit" class="btn btn--primary" data-i18n="adminPublish">Publish</button>
              <button type="reset" class="btn btn--ghost" data-i18n="adminClearForm">Clear form</button>
            </div>
            <p id="upload-status" class="admin__status" role="status"></p>
            <div id="upload-success" class="admin-upload-success is-hidden"></div>
          </form>

          <aside class="admin-upload-preview">
            <h2 data-i18n="adminPreview">Preview</h2>
            <div class="admin-upload-preview__card" id="upload-preview">
              <div class="admin-upload-preview__img" id="preview-img">
                <span data-i18n="adminPreviewEmpty">Image preview</span>
              </div>
              <p class="admin-upload-preview__meta" id="preview-meta">—</p>
              <h3 class="admin-upload-preview__title" id="preview-title" data-i18n="adminPreviewTitle">Title</h3>
              <p class="admin-upload-preview__type" id="preview-type">article</p>
            </div>
          </aside>
        </div>
      </section>
    </div>
  </div>

  <div class="modal" id="auth-modal" aria-hidden="true">
    <div class="modal__backdrop" data-close-auth></div>
    <div class="modal__panel modal__panel--wide" role="dialog">
      <button class="modal__close" type="button" data-close-auth>&times;</button>
      <h2 class="modal__title" data-i18n="authTitle">NaMe Account</h2>
      <p id="auth-error" class="auth-error" hidden></p>
      <div class="auth-tabs">
        <button type="button" class="auth-tabs__btn is-active" data-auth-tab="login" data-i18n="authLogin">Login</button>
        <button type="button" class="auth-tabs__btn" data-auth-tab="register" data-i18n="authRegister">Join</button>
      </div>
      <form id="auth-login-form" class="auth-form" data-auth-panel="login" autocomplete="on">
        <input type="email" name="loginEmail" data-login-email autocomplete="username" value="chensteven435688@gmail.com" required />
        <input type="password" name="loginPassword" data-login-password autocomplete="current-password" required />
        <button type="submit" class="btn btn--primary" data-i18n="authLoginBtn">Login</button>
      </form>
      <form id="auth-register-form" class="auth-form is-hidden" data-auth-panel="register" autocomplete="on">
        <input type="text" name="registerName" data-register-name autocomplete="name" required />
        <input type="email" name="registerEmail" data-register-email autocomplete="email" required />
        <input type="password" name="registerPassword" data-register-password autocomplete="new-password" required minlength="8" />
        <button type="submit" class="btn btn--primary" data-i18n="authRegisterBtn">Create account</button>
      </form>
    </div>
  </div>

  <script src="base.js"></script>
  <script src="base.js"></script>
  <script src="i18n.js?v=2"></script>
  <script src="auth.js?v=2"></script>
  <script src="admin-common.js?v=2"></script>
  <script src="admin-upload.js?v=2"></script>
</body>
</html>
