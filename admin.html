<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaMe — Admin</title>
  <script src="admin-boot.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-admin">
  <div id="admin-gate" class="admin-gate">
    <div class="admin-gate__shell">
      <div class="admin-gate__brand">
        <a href="./" class="logo"><span class="brand-mark">NaMe</span></a>
        <p class="admin-gate__eyebrow" data-i18n="adminGateLabel">Editorial desk</p>
      </div>
      <div class="admin-gate__panel">
        <h1 data-i18n="adminGateTitle">Admin access</h1>
        <p class="admin-gate__text" data-i18n="adminDeniedPanel">You need an admin account to use this panel.</p>
        <p class="admin-gate__hint" data-i18n="adminGateHint">Sign in with your editor account to continue.</p>
        <p id="admin-gate-status" class="admin-gate__status" hidden></p>
        <div class="admin-gate__actions">
          <button type="button" class="btn btn--primary" data-open-auth="login" data-i18n="authLoginBtn">Login</button>
          <a href="./" class="admin-gate__back" data-i18n="backHome">← Back to NaMe</a>
        </div>
      </div>
    </div>
  </div>

  <div id="admin-app" class="admin-app is-hidden">
    <aside class="admin-sidebar">
      <a href="./" class="logo admin-sidebar__logo"><span class="brand-mark">NaMe</span></a>
      <p class="admin-sidebar__label" data-i18n="adminPanel">Admin</p>
      <nav class="admin-nav" id="admin-sidebar-nav"></nav>
      <div class="admin-sidebar__foot">
        <a href="./" target="_blank" rel="noopener" data-i18n="adminViewSite">View site →</a>
        <button type="button" id="admin-logout" data-i18n="adminLogout">Log out</button>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <h1 class="admin-topbar__title" id="admin-page-title" data-i18n="adminNavDashboard">Dashboard</h1>
        <span class="admin-topbar__user" id="admin-user-label"></span>
      </header>

      <!-- Dashboard -->
      <section class="admin-panel is-active" data-panel-view="dashboard">
        <div class="admin-stats" id="admin-stats"></div>
        <div class="admin-card">
          <h2 data-i18n="adminRecentPosts">Recent posts</h2>
          <ul class="admin-table" id="dashboard-recent"></ul>
        </div>
      </section>

      <!-- Content list -->
      <section class="admin-panel" data-panel-view="content">
        <div class="admin-toolbar">
          <input type="search" id="content-search" placeholder="Search title…" data-i18n-placeholder="adminSearch" />
          <select id="content-filter-type">
            <option value="" data-i18n="adminAllTypes">All types</option>
            <option value="article">Article</option>
            <option value="editorial">Editorial</option>
            <option value="film">Film</option>
            <option value="short">Short</option>
            <option value="exclusive">Editor's Exclusive</option>
          </select>
        </div>
        <div class="admin-card admin-card--flush">
          <table class="admin-data-table">
            <thead>
              <tr>
                <th data-i18n="adminColTitle">Title</th>
                <th data-i18n="adminType">Type</th>
                <th data-i18n="adminSection">Section</th>
                <th data-i18n="adminFeatured">Featured</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="content-table-body"></tbody>
          </table>
        </div>
      </section>

      <!-- Users -->
      <section class="admin-panel" data-panel-view="users">
        <div class="admin-card admin-card--flush">
          <table class="admin-data-table">
            <thead>
              <tr>
                <th data-i18n="adminColName">Name</th>
                <th>Email</th>
                <th data-i18n="adminColRole">Role</th>
                <th data-i18n="adminColJoined">Joined</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="users-table-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <!-- Edit post modal -->
  <div class="modal" id="edit-modal" aria-hidden="true">
    <div class="modal__backdrop" data-close-edit></div>
    <div class="modal__panel modal__panel--admin" role="dialog">
      <button class="modal__close" type="button" data-close-edit>&times;</button>
      <h2 class="modal__title" data-i18n="adminEditPost">Edit post</h2>
      <form class="admin-form" id="edit-form">
        <input type="hidden" name="id" id="edit-id" />
        <div class="admin-form__grid">
          <label>
            <span data-i18n="adminType">Type</span>
            <select name="type" required>
              <option value="article">Article</option>
              <option value="editorial">Editorial</option>
              <option value="film">Film</option>
              <option value="short">Short</option>
            <option value="exclusive">Editor's Exclusive</option>
            </select>
          </label>
          <label>
            <span data-i18n="adminSection">Section</span>
            <select name="section">
              <option value="">—</option>
              <option value="latest">Latest</option>
              <option value="popular">Popular</option>
            </select>
          </label>
        </div>
        <label>
          <span data-i18n="adminTitleField">Title</span>
          <input type="text" name="title" required />
        </label>
        <label>
          <span data-i18n="adminSlug">URL slug</span>
          <input type="text" name="slug" />
        </label>
        <label>
          <span data-i18n="adminMeta">Meta</span>
          <input type="text" name="meta" />
        </label>
        <label>
          <span data-content-date-label data-i18n="adminCreatedDate">Date created / filmed</span>
          <input type="date" name="contentDate" id="edit-content-date" />
        </label>
        <label>
          <span data-i18n="adminImage">New cover image</span>
          <input type="file" name="image" accept="image/*" />
        </label>
        <label>
          <span data-i18n="adminImageUrl">Image URL</span>
          <input type="url" name="imageUrl" />
        </label>
        <label>
          <span data-i18n="adminBody">Body</span>
          <textarea name="body" id="edit-body" rows="8"></textarea>
        </label>
        <label>
          <span data-i18n="adminVideo">Video URL</span>
          <input type="url" name="videoUrl" />
        </label>
        <label class="admin__check">
          <input type="checkbox" name="featured" value="1" />
          <span data-i18n="adminFeatured">Featured on cover hero</span>
        </label>
        <div class="admin-form__actions">
          <button type="submit" class="btn btn--primary" data-i18n="adminSave">Save changes</button>
          <button type="button" class="btn btn--ghost" data-close-edit data-i18n="close">Close</button>
        </div>
        <p id="edit-status" class="admin__status"></p>
      </form>
    </div>
  </div>

  <script src="base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="i18n.js"></script>
  <script src="auth.js"></script>
  <script src="admin-common.js"></script>
  <script src="admin-body-images.js"></script>
  <script src="admin.js"></script>
</body>
</html>
