<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your NaMe Magazine account is verified" />
  <title>Email verified — NaMe Magazine</title>
  <link rel="icon" href="../images/favicon.png" />
  <link rel="apple-touch-icon" href="../images/favicon.png" />
  <script src="../auth-boot.js"></script>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="page-static auth-callback" data-page-title="verifySuccessPageTitle" data-page-description="verifySuccessPageDescription">
  <header class="header header--minimal" id="header">
    <div class="header__top">
      <a href="../" class="logo"><span class="brand-mark">NaMe</span></a>
      <nav class="header__actions" aria-label="Quick actions">
        <a href="../" class="auth-page__back" data-i18n="backHome">← Back to NaMe</a>
      </nav>
    </div>
  </header>

  <main class="auth-callback__main register-verified">
    <p class="auth-callback__label" data-i18n="verifySuccessEyebrow">You're all set</p>
    <h1 class="auth-callback__title" id="auth-callback-title" data-i18n="verifySuccessTitle">Successfully registered</h1>
    <p class="auth-callback__text" id="auth-callback-text" data-i18n="verifySuccessLead">
      Your email is verified. Close this page, return to the NaMe tab where you signed up, and log in to continue.
    </p>
    <p class="register-verified__hint" id="auth-callback-hint" data-i18n="verifySuccessHint">
      If you don't have that tab open anymore, use the button below to log in.
    </p>
    <a href="../account.html" class="btn btn--primary auth-callback__btn" id="auth-callback-btn" hidden data-i18n="verifySuccessLoginBtn">Go to login</a>
    <p id="auth-callback-status" class="register-verified__status" hidden role="status"></p>
  </main>

  <script src="../base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase.js"></script>
  <script src="../i18n.js"></script>
  <script src="../auth.js"></script>
  <script src="callback.js"></script>
</body>
</html>
