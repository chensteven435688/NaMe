<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NaMe Magazine" />
  <title>NaMe Magazine</title>
  <script src="auth-boot.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-post">
  <header class="header" id="header">
    <div class="header__top">
      <a href="./" class="logo"><span class="brand-mark">NaMe</span></a>
      <nav class="header__actions" aria-label="Quick actions">
        <a href="subscribe.html" id="header-subscribe-link" data-i18n="subscribe">Subscribe</a>
        <a href="about.html" data-i18n="about">About</a>
        <a href="admin-upload.html" id="admin-link" hidden data-i18n="admin">Admin</a>
        <a href="account.html" id="auth-link" data-i18n="loginJoin">Login / Join</a>
      </nav>
    </div>
    <div class="header__secondary header__secondary--solo" id="main-nav">
      <div class="lang-select header__lang">
        <select id="lang-select" data-i18n-aria="language" aria-label="Language">
          <option value="en">English</option>
          <option value="ko">한국어</option>
          <option value="it">Italiano</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
          <option value="ja">日本語</option>
          <option value="zh-Hans">简体中文</option>
          <option value="zh-Hant">繁體中文</option>
        </select>
      </div>
    </div>
  </header>

  <main class="post-page">
    <a href="./" class="post-page__back" data-i18n="backHome">← Back to NaMe</a>
    <div id="post-root"></div>

    <section class="comments" id="comments">
      <h2 class="comments__title" data-i18n="commentsTitle">Comments</h2>
      <p class="comments__hint" data-i18n="commentsHint">Join NaMe to comment and like on editorial posts.</p>
      <form class="comments__form" id="comment-form">
        <textarea rows="3" data-i18n-placeholder="commentPlaceholder" placeholder="Add a comment…" maxlength="500" required></textarea>
        <button type="submit" class="btn btn--primary" data-i18n="commentPost">Post</button>
      </form>
      <div class="comments__list" id="comments-list"></div>
    </section>
  </main>

  <!-- Auth modal -->
  <div class="modal" id="auth-modal" aria-hidden="true">
    <div class="modal__backdrop" data-close-auth></div>
    <div class="modal__panel modal__panel--wide" role="dialog" aria-labelledby="auth-modal-title">
      <button class="modal__close" type="button" data-close-auth>&times;</button>
      <h2 id="auth-modal-title" class="modal__title" data-i18n="authTitle">NaMe Account</h2>
      <p id="auth-error" class="auth-error" hidden></p>
      <div class="auth-tabs">
        <button type="button" class="auth-tabs__btn is-active" data-auth-tab="login" data-i18n="authLogin">Login</button>
        <button type="button" class="auth-tabs__btn" data-auth-tab="register" data-i18n="authRegister">Join</button>
      </div>
      <form id="auth-login-form" class="auth-form" data-auth-panel="login" autocomplete="on">
        <input type="email" name="loginEmail" data-login-email data-i18n-placeholder="authEmail" placeholder="Email" required autocomplete="username" />
        <input type="password" name="loginPassword" data-login-password data-i18n-placeholder="authPassword" placeholder="Password" required autocomplete="current-password" />
        <button type="submit" class="btn btn--primary" data-i18n="authLoginBtn">Login</button>
      </form>
      <form id="auth-register-form" class="auth-form is-hidden" data-auth-panel="register" autocomplete="on">
        <input type="text" name="registerName" data-register-name data-i18n-placeholder="authDisplayName" placeholder="Display name" required autocomplete="name" />
        <input type="email" name="registerEmail" data-register-email data-i18n-placeholder="authEmail" placeholder="Email" required autocomplete="email" />
        <input type="password" name="registerPassword" data-register-password data-i18n-placeholder="authPasswordMin" placeholder="Password (8+ characters)" required minlength="8" autocomplete="new-password" />
        <button type="submit" class="btn btn--primary" data-i18n="authRegisterBtn">Create account</button>
      </form>

    </div>
  </div>

  <script src="base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="i18n.js"></script>
  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script src="post.js"></script>
</body>
</html>
